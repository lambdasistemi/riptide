<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>riptide</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: oklch(0.14 0.01 260);
        color: oklch(0.92 0.01 260);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: oklch(0.14 0.01 260);
      }

      button {
        font: inherit;
      }

      .rt-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .rt-topbar,
      .rt-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-bottom: 1px solid oklch(0.26 0.01 260);
        background: oklch(0.17 0.01 260);
      }

      .rt-brand {
        font-weight: 800;
        letter-spacing: 0;
      }

      .rt-tabs {
        display: flex;
        gap: 4px;
        padding: 3px;
        border: 1px solid oklch(0.28 0.01 260);
        border-radius: 8px;
        background: oklch(0.13 0.01 260);
      }

      .rt-tab,
      .rt-chip,
      .rt-hush,
      .rt-actions button {
        min-height: 32px;
        border-radius: 7px;
        border: 1px solid oklch(0.3 0.01 260);
        background: oklch(0.2 0.01 260);
        color: oklch(0.82 0.01 260);
        cursor: pointer;
      }

      .rt-tab {
        padding: 0 12px;
      }

      .rt-tab.is-selected {
        background: oklch(0.23 0.03 200);
        color: oklch(0.88 0.07 200);
        border-color: oklch(0.42 0.08 200);
      }

      .rt-spacer {
        flex: 1;
      }

      .rt-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
      }

      .rt-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: oklch(0.72 0.16 155);
      }

      .rt-chip.is-invalid {
        color: oklch(0.84 0.1 25);
        border-color: oklch(0.42 0.12 25);
      }

      .rt-chip.is-invalid .rt-dot,
      .rt-hush {
        background: oklch(0.66 0.18 25);
      }

      .rt-hush {
        padding: 0 16px;
        color: oklch(0.12 0.01 25);
        font-weight: 800;
        border-color: oklch(0.56 0.14 25);
      }

      .rt-active,
      .rt-count {
        color: oklch(0.68 0.01 260);
        font-size: 12px;
      }

      .rt-actions {
        justify-content: flex-end;
        padding-block: 8px;
      }

      .rt-actions button {
        padding: 0 12px;
      }

      .rt-page {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(180px, 240px) 1fr;
      }

      .rt-rail {
        padding: 16px;
        border-right: 1px solid oklch(0.26 0.01 260);
        background: oklch(0.16 0.01 260);
      }

      .rt-rail-title {
        margin-bottom: 10px;
        color: oklch(0.58 0.01 260);
        font-size: 12px;
        text-transform: uppercase;
      }

      .rt-list-row,
      .rt-track,
      .rt-block,
      .rt-score-placeholder,
      .rt-empty {
        border: 1px solid oklch(0.28 0.01 260);
        border-radius: 8px;
        background: oklch(0.18 0.01 260);
      }

      .rt-list-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 10px;
        margin-bottom: 8px;
      }

      .rt-list-row small {
        color: oklch(0.55 0.01 260);
      }

      .rt-workspace {
        min-width: 0;
        padding: 20px;
        overflow: auto;
      }

      .rt-page-header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 18px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 24px;
      }

      h2 {
        font-size: 14px;
      }

      p {
        color: oklch(0.64 0.01 260);
        line-height: 1.5;
      }

      .rt-track-stack,
      .rt-block-grid {
        display: grid;
        gap: 12px;
      }

      .rt-track,
      .rt-block,
      .rt-score-placeholder,
      .rt-empty {
        padding: 14px;
      }

      .rt-cell-strip {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .rt-cell-pill,
      .rt-block code {
        display: block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 8px 10px;
        border-radius: 7px;
        color: oklch(0.86 0.05 200);
        background: oklch(0.13 0.02 250);
      }

      .rt-block-grid {
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }

      .rt-block-head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 10px;
      }

      .rt-block-head span {
        color: oklch(0.74 0.11 155);
        font-size: 12px;
      }

      .rt-block.is-invalid {
        border-color: oklch(0.45 0.12 25);
      }

      .rt-block.is-invalid .rt-block-head span {
        color: oklch(0.74 0.13 25);
      }

      .rt-score-placeholder,
      .rt-empty {
        margin-top: 16px;
        border-style: dashed;
      }

      @media (max-width: 760px) {
        .rt-topbar,
        .rt-actions {
          flex-wrap: wrap;
        }

        .rt-spacer {
          display: none;
        }

        .rt-page {
          grid-template-columns: 1fr;
        }

        .rt-rail {
          border-right: 0;
          border-bottom: 1px solid oklch(0.26 0.01 260);
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="../src/bootstrap.js"></script>
  </body>
</html>
