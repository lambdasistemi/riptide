<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>riptide</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: oklch(0.14 0.01 260);
        color: oklch(0.92 0.01 260);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: oklch(0.14 0.01 260);
      }

      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid oklch(0.32 0.02 245);
        border-radius: 7px;
        background: oklch(0.12 0.01 245);
        color: oklch(0.9 0.02 230);
        font: inherit;
      }

      input {
        min-height: 32px;
        padding: 0 9px;
      }

      textarea {
        min-height: 78px;
        padding: 9px;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      .rt-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .rt-topbar,
      .rt-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-bottom: 1px solid oklch(0.26 0.01 260);
        background: oklch(0.17 0.01 260);
      }

      .rt-brand {
        font-weight: 800;
        letter-spacing: 0;
      }

      .rt-tabs {
        display: flex;
        gap: 4px;
        padding: 3px;
        border: 1px solid oklch(0.28 0.01 260);
        border-radius: 8px;
        background: oklch(0.13 0.01 260);
      }

      .rt-tab,
      .rt-chip,
      .rt-hush,
      .rt-actions button,
      .rt-page button {
        min-height: 32px;
        border-radius: 7px;
        border: 1px solid oklch(0.3 0.01 260);
        background: oklch(0.2 0.01 260);
        color: oklch(0.82 0.01 260);
        cursor: pointer;
      }

      .rt-page button {
        padding: 0 10px;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .rt-tab {
        padding: 0 12px;
      }

      .rt-tab.is-selected {
        background: oklch(0.23 0.03 200);
        color: oklch(0.88 0.07 200);
        border-color: oklch(0.42 0.08 200);
      }

      .rt-spacer {
        flex: 1;
      }

      .rt-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
      }

      .rt-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: oklch(0.72 0.16 155);
      }

      .rt-chip.is-invalid {
        color: oklch(0.84 0.1 25);
        border-color: oklch(0.42 0.12 25);
      }

      .rt-chip.is-invalid .rt-dot,
      .rt-hush {
        background: oklch(0.66 0.18 25);
      }

      .rt-hush {
        padding: 0 16px;
        color: oklch(0.12 0.01 25);
        font-weight: 800;
        border-color: oklch(0.56 0.14 25);
      }

      .rt-active,
      .rt-count {
        color: oklch(0.68 0.01 260);
        font-size: 12px;
      }

      .rt-actions {
        justify-content: flex-end;
        padding-block: 8px;
      }

      .rt-actions button {
        padding: 0 12px;
      }

      .rt-page {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(180px, 240px) 1fr;
      }

      .rt-rail {
        padding: 16px;
        border-right: 1px solid oklch(0.26 0.01 260);
        background: oklch(0.16 0.01 260);
      }

      .rt-rail-title {
        color: oklch(0.58 0.01 260);
        font-size: 12px;
        text-transform: uppercase;
      }

      .rt-rail-meta {
        margin-bottom: 10px;
        color: oklch(0.62 0.02 235);
        font-size: 12px;
      }

      .rt-rail-head,
      .rt-header-actions,
      .rt-row-actions,
      .rt-track-tools,
      .rt-cell-head,
      .rt-cell-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .rt-rail-head,
      .rt-cell-head,
      .rt-cell-actions {
        justify-content: space-between;
      }

      .rt-list-row,
      .rt-track,
      .rt-block,
      .rt-score-placeholder,
      .rt-empty {
        border: 1px solid oklch(0.28 0.01 260);
        border-radius: 8px;
        background: oklch(0.18 0.01 260);
      }

      .rt-list-row {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        padding: 10px;
        margin-bottom: 8px;
      }

      .rt-list-row.is-selected {
        border-color: oklch(0.52 0.12 155);
        background: oklch(0.2 0.03 165);
      }

      .rt-list-main {
        min-width: 0;
        flex: 1;
      }

      .rt-link-button {
        width: 100%;
        min-height: 0;
        padding: 0;
        border: 0;
        background: transparent;
        color: oklch(0.9 0.03 220);
        text-align: left;
        font-weight: 700;
      }

      .rt-row-actions {
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .rt-list-row small {
        color: oklch(0.55 0.01 260);
      }

      .rt-workspace {
        min-width: 0;
        padding: 20px;
        overflow: auto;
      }

      .rt-page-header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 18px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 24px;
      }

      h2 {
        font-size: 14px;
      }

      p {
        color: oklch(0.64 0.01 260);
        line-height: 1.5;
      }

      .rt-kicker {
        margin-bottom: 4px;
        color: oklch(0.72 0.12 155);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .rt-track-stack,
      .rt-block-grid,
      .rt-launch-grid {
        display: grid;
        gap: 12px;
      }

      .rt-track,
      .rt-block,
      .rt-score-placeholder,
      .rt-empty {
        padding: 14px;
      }

      .rt-track {
        display: grid;
        grid-template-columns: minmax(180px, 240px) 1fr;
        gap: 14px;
        border-left: 5px solid oklch(0.64 0.14 var(--track-hue));
      }

      .rt-track-gutter {
        display: grid;
        align-content: start;
        gap: 12px;
      }

      .rt-track-tools {
        justify-content: space-between;
      }

      .rt-block-actions,
      .rt-block-badges {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .rt-block-actions {
        justify-content: space-between;
      }

      .rt-ctrls {
        display: grid;
        gap: 9px;
      }

      .rt-ctrl {
        display: grid;
        grid-template-columns: 30px 1fr 32px;
        align-items: center;
        gap: 8px;
        color: oklch(0.67 0.02 250);
        font-size: 12px;
      }

      .rt-ctrl output {
        text-align: right;
        color: oklch(0.82 0.03 230);
      }

      .rt-cell-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 8px;
        align-items: stretch;
      }

      .rt-cell-pill,
      .rt-block code,
      .rt-badge {
        display: block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 8px 10px;
        border-radius: 7px;
        color: oklch(0.86 0.05 200);
        background: oklch(0.13 0.02 250);
      }

      .rt-badge {
        display: inline-flex;
        width: auto;
        font-size: 11px;
        font-weight: 800;
      }

      .rt-cell,
      .rt-cell-add {
        min-height: 172px;
        border: 1px solid oklch(0.28 0.02 245);
        border-radius: 8px;
        background: oklch(0.14 0.01 245);
      }

      .rt-cell {
        display: grid;
        gap: 8px;
        padding: 10px;
      }

      .rt-cell-add {
        display: grid;
        place-items: center;
        border-style: dashed;
        color: oklch(0.75 0.11 155);
        font-weight: 800;
      }

      .rt-cell-state {
        border-radius: 999px;
        padding: 3px 7px;
        background: oklch(0.22 0.02 250);
        color: oklch(0.72 0.02 250);
        font-size: 11px;
        font-weight: 800;
      }

      .rt-cell.is-empty {
        border-style: dashed;
        background: oklch(0.16 0.01 250);
      }

      .rt-cell.has-text-idle {
        border-color: oklch(0.34 0.06 210);
      }

      .rt-cell.is-selected-armed {
        box-shadow: inset 0 0 0 2px oklch(0.7 0.14 95);
      }

      .rt-cell.is-selected-armed .rt-cell-state {
        background: oklch(0.26 0.08 95);
        color: oklch(0.86 0.12 95);
      }

      .rt-cell.is-active-playing {
        border-color: oklch(0.68 0.17 155);
        background: oklch(0.18 0.05 160);
      }

      .rt-cell.is-active-playing .rt-cell-state {
        background: oklch(0.3 0.11 155);
        color: oklch(0.88 0.13 155);
      }

      .rt-cell.is-invalid {
        border-color: oklch(0.57 0.16 25);
        background: oklch(0.18 0.04 25);
      }

      .rt-cell.is-invalid .rt-cell-state,
      .rt-danger {
        color: oklch(0.86 0.13 25);
      }

      .rt-cell.is-being-edited {
        outline: 2px solid oklch(0.72 0.16 200);
        outline-offset: 2px;
      }

      .rt-cell-error {
        color: oklch(0.78 0.15 25);
        font-size: 12px;
      }

      .rt-block-grid {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }

      .rt-block {
        display: grid;
        gap: 10px;
        align-content: start;
      }

      .rt-block-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .rt-block-head input {
        min-width: 0;
        font-weight: 800;
      }

      .rt-block-state {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 4px 8px;
        background: oklch(0.22 0.04 155);
        color: oklch(0.74 0.11 155);
        font-size: 12px;
        font-weight: 800;
      }

      .rt-block.is-empty {
        border-style: dashed;
      }

      .rt-block.is-invalid {
        border-color: oklch(0.45 0.12 25);
        background: oklch(0.18 0.04 25);
      }

      .rt-block.is-invalid .rt-block-state,
      .rt-block-error {
        color: oklch(0.74 0.13 25);
      }

      .rt-block.is-invalid .rt-block-state {
        background: oklch(0.24 0.08 25);
      }

      .rt-block.is-unsaved {
        box-shadow: inset 0 0 0 1px oklch(0.55 0.1 95);
      }

      .rt-block-error,
      .rt-cascade-warning {
        font-size: 12px;
      }

      .rt-cascade-warning {
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid oklch(0.42 0.12 25);
        border-radius: 8px;
        color: oklch(0.84 0.11 25);
        background: oklch(0.15 0.03 25);
      }

      .rt-cascade-warning ul {
        display: grid;
        gap: 6px;
        margin: 0;
        padding-left: 18px;
      }

      .rt-cascade-warning li {
        min-width: 0;
      }

      .rt-cascade-warning strong {
        display: block;
        margin-bottom: 3px;
        color: oklch(0.88 0.1 55);
      }

      .rt-cascade-warning code {
        white-space: nowrap;
      }

      .rt-score-placeholder,
      .rt-empty {
        margin-top: 16px;
        border-style: dashed;
      }

      @media (max-width: 760px) {
        .rt-topbar,
        .rt-actions {
          flex-wrap: wrap;
        }

        .rt-spacer {
          display: none;
        }

        .rt-page {
          grid-template-columns: 1fr;
        }

        .rt-rail {
          border-right: 0;
          border-bottom: 1px solid oklch(0.26 0.01 260);
        }

        .rt-track {
          grid-template-columns: 1fr;
        }

        .rt-page-header,
        .rt-block-head,
        .rt-block-actions {
          align-items: stretch;
          flex-direction: column;
        }

        .rt-header-actions {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="../src/bootstrap.js"></script>
  </body>
</html>
