<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>riptide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: dark;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        background: oklch(0.15 0.008 260);
        color: oklch(0.9 0.006 260);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: oklch(0.15 0.008 260);
        -webkit-font-smoothing: antialiased;
      }

      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid oklch(0.3 0.01 260);
        border-radius: 6px;
        background: oklch(0.13 0.01 260);
        color: oklch(0.92 0.006 260);
        font: inherit;
      }

      input:focus,
      textarea:focus {
        outline: 1px solid oklch(0.4 0.06 200);
        outline-offset: 1px;
        border-color: oklch(0.46 0.08 200);
      }

      input {
        min-height: 32px;
        padding: 0 9px;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        min-height: 4px;
        height: 4px;
        padding: 0;
        border: 0;
        border-radius: 3px;
        background: linear-gradient(to right, oklch(0.7 0.14 var(--track-hue)) 0 58%, oklch(0.28 0.01 260) 58% 100%);
        outline: none;
        cursor: pointer;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 11px;
        height: 11px;
        border: 1px solid oklch(0.2 0.01 260);
        border-radius: 50%;
        background: oklch(0.86 0.008 260);
        cursor: grab;
      }

      input[type="range"]::-webkit-slider-thumb:active {
        cursor: grabbing;
      }

      input[type="range"]::-moz-range-thumb {
        width: 10px;
        height: 10px;
        border: 1px solid oklch(0.2 0.01 260);
        border-radius: 50%;
        background: oklch(0.86 0.008 260);
        cursor: grab;
      }

      textarea {
        min-height: 64px;
        height: 100%;
        padding: 7px;
        resize: vertical;
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 12px;
        line-height: 1.45;
      }

      code,
      output {
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }

      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        border-radius: 6px;
        background: oklch(0.32 0.01 260);
      }

      ::-webkit-scrollbar-thumb:hover {
        background: oklch(0.4 0.01 260);
      }

      .rt-shell {
        min-height: 100vh;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: oklch(0.15 0.008 260);
      }

      .rt-topbar,
      .rt-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 18px;
        border-bottom: 1px solid oklch(0.26 0.01 260);
        background: oklch(0.18 0.01 260);
        flex: none;
      }

      .rt-topbar {
        min-height: 56px;
      }

      .rt-brand {
        display: inline-flex;
        align-items: baseline;
        gap: 9px;
        color: oklch(0.94 0.006 260);
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-weight: 600;
        font-size: 17px;
        letter-spacing: 0.5px;
      }

      .rt-brand::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 2px;
        background: oklch(0.72 0.16 200);
        box-shadow: 0 0 10px oklch(0.72 0.16 200 / 0.7);
        transform: rotate(45deg);
      }

      .rt-brand::after {
        content: "TIDALCYCLES";
        color: oklch(0.5 0.01 260);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 10px;
        font-weight: 400;
        letter-spacing: 1px;
      }

      .rt-tabs {
        display: flex;
        gap: 3px;
        padding: 3px;
        border: 1px solid oklch(0.28 0.01 260);
        border-radius: 9px;
        background: oklch(0.14 0.01 260);
      }

      .rt-tab,
      .rt-chip,
      .rt-hush,
      .rt-actions button,
      .rt-page button {
        min-height: 30px;
        border-radius: 7px;
        border: 1px solid oklch(0.3 0.01 260);
        background: oklch(0.2 0.01 260);
        color: oklch(0.78 0.01 260);
        cursor: pointer;
        transition: border-color 120ms ease, background 120ms ease, color 120ms ease, box-shadow 120ms ease;
      }

      .rt-page button {
        padding: 0 10px;
      }

      .rt-icon-button {
        width: 34px;
        min-width: 34px;
        height: 34px;
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border-radius: 7px;
        line-height: 1;
      }

      .rt-icon-button .rt-icon {
        width: 18px;
        height: 18px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .rt-tab {
        padding: 0 12px;
        border-color: transparent;
        background: transparent;
        color: oklch(0.62 0.01 260);
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-size: 12px;
      }

      .rt-tab.is-selected {
        background: oklch(0.23 0.025 200);
        color: oklch(0.88 0.06 200);
        border-color: oklch(0.34 0.05 200);
        box-shadow: 0 0 14px oklch(0.72 0.16 200 / 0.12);
      }

      .rt-spacer {
        flex: 1;
      }

      .rt-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        background: oklch(0.14 0.01 260);
        color: oklch(0.78 0.01 260);
        font-size: 12px;
      }

      .rt-scope {
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
      }

      .rt-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: oklch(0.72 0.16 155);
        box-shadow: 0 0 10px oklch(0.72 0.16 155 / 0.55);
      }

      .rt-chip.is-invalid {
        color: oklch(0.84 0.1 25);
        border-color: oklch(0.42 0.12 25);
      }

      .rt-chip.is-invalid .rt-dot,
      .rt-hush {
        background: oklch(0.66 0.18 25);
      }

      .rt-hush {
        color: oklch(0.12 0.01 25);
        font-weight: 600;
        border-color: oklch(0.56 0.14 25);
      }

      .rt-active,
      .rt-count {
        color: oklch(0.58 0.01 260);
        font-size: 12px;
      }

      .rt-actions {
        justify-content: flex-end;
        gap: 12px;
        min-height: 40px;
        padding-block: 5px;
        flex-wrap: wrap;
        border-color: oklch(0.22 0.01 260);
        background: oklch(0.163 0.009 260);
      }

      .rt-actions button {
        background: transparent;
        color: oklch(0.62 0.01 260);
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-size: 11px;
      }

      .rt-action-group {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .rt-action-cluster {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding-left: 12px;
        border-left: 1px solid oklch(0.28 0.01 260);
      }

      .rt-action-cluster:first-child {
        padding-left: 0;
        border-left: 0;
      }

      .rt-action-label {
        color: oklch(0.58 0.01 260);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.8px;
        text-transform: uppercase;
      }

      .rt-toast {
        min-height: 30px;
        padding: 7px 16px;
        border-bottom: 1px solid oklch(0.26 0.01 260);
        background: oklch(0.2 0.03 165);
        color: oklch(0.86 0.06 165);
        font-size: 13px;
        font-weight: 700;
      }

      .rt-page {
        flex: 1;
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(190px, 248px) 1fr;
        overflow: hidden;
      }

      .rt-rail {
        display: flex;
        flex-direction: column;
        min-height: 0;
        padding: 8px;
        border-right: 1px solid oklch(0.22 0.01 260);
        background: oklch(0.16 0.01 260);
        overflow: auto;
      }

      .rt-rail-title {
        color: oklch(0.58 0.01 260);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      .rt-rail-meta {
        margin-bottom: 10px;
        color: oklch(0.5 0.01 260);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 10px;
      }

      .rt-rail-head,
      .rt-header-actions,
      .rt-row-actions,
      .rt-track-head,
      .rt-cell-head {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .rt-rail-head {
        justify-content: space-between;
      }

      .rt-list-row,
      .rt-track,
      .rt-block,
      .rt-score,
      .rt-empty {
        border: 1px solid oklch(0.28 0.01 260);
        border-radius: 8px;
        background: oklch(0.17 0.009 260);
      }

      .rt-list-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        gap: 10px;
        padding: 9px;
        margin-bottom: 6px;
        border-color: transparent;
        background: transparent;
      }

      .rt-list-row.is-selected {
        border-color: oklch(0.4 0.08 200);
        background: oklch(0.2 0.025 200);
        box-shadow: inset 3px 0 0 oklch(0.72 0.16 200);
      }

      .rt-list-main {
        min-width: 0;
        flex: 1;
      }

      .rt-list-main input {
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-weight: 600;
      }

      .rt-link-button {
        width: 100%;
        min-height: 0;
        padding: 0;
        border: 0;
        background: transparent;
        color: oklch(0.92 0.006 260);
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        overflow: hidden;
        text-overflow: ellipsis;
        text-align: left;
        font-weight: 700;
        white-space: nowrap;
      }

      .rt-row-actions {
        flex: 0 0 auto;
        flex-wrap: wrap;
        justify-content: flex-end;
        width: 76px;
      }

      .rt-list-row small {
        color: oklch(0.5 0.01 260);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 9.5px;
      }

      .rt-workspace {
        min-width: 0;
        padding: 14px 18px 24px;
        overflow: auto;
        background: oklch(0.15 0.008 260);
      }

      .rt-page-header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 18px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        color: oklch(0.95 0.006 260);
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-size: 18px;
        font-weight: 600;
      }

      h2 {
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-size: 14px;
        font-weight: 600;
      }

      p {
        color: oklch(0.52 0.01 260);
        line-height: 1.5;
      }

      .rt-kicker {
        margin-bottom: 4px;
        color: oklch(0.5 0.01 260);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 9px;
        font-weight: 500;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      .rt-track-stack,
      .rt-block-grid,
      .rt-launch-grid {
        display: grid;
        gap: 8px;
      }

      .rt-track,
      .rt-block,
      .rt-score,
      .rt-empty {
        padding: 10px;
      }

      .rt-track {
        display: grid;
        grid-template-columns: minmax(190px, 220px) 1fr;
        gap: 7px;
        border-color: oklch(0.24 0.01 260);
        border-left: 3px solid oklch(0.64 0.14 var(--track-hue));
        background: oklch(0.16 0.008 260);
        box-shadow: 0 0 0 1px oklch(0.18 0.01 260 / 0.6), 0 12px 30px oklch(0.07 0.01 260 / 0.18);
      }

      .rt-track-gutter {
        display: grid;
        align-content: start;
        gap: 6px;
        padding: 1px 2px;
      }

      .rt-track-head input {
        min-width: 0;
        min-height: 28px;
        padding: 0 7px;
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-weight: 600;
      }

      .rt-track-head {
        width: 100%;
      }

      .rt-block-actions,
      .rt-block-badges {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }

      .rt-block-actions {
        justify-content: space-between;
      }

      .rt-ctrls {
        display: grid;
        gap: 6px;
      }

      .rt-ctrl {
        display: grid;
        grid-template-columns: 30px 1fr 32px;
        align-items: center;
        gap: 7px;
        color: oklch(0.52 0.01 260);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 8px;
        font-weight: 500;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      .rt-ctrl output {
        text-align: right;
        color: oklch(0.64 0.01 260);
        font-size: 9px;
        font-variant-numeric: tabular-nums;
      }

      .rt-cell-strip {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 6px;
        align-items: stretch;
      }

      .rt-cell-pill,
      .rt-block code,
      .rt-badge {
        display: block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        padding: 5px 8px;
        border: 1px solid oklch(0.3 0.01 260);
        border-radius: 6px;
        color: oklch(0.72 0.015 200);
        background: oklch(0.13 0.01 260);
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }

      .rt-badge {
        display: inline-flex;
        width: auto;
        font-size: 10px;
        font-weight: 500;
      }

      .rt-cell,
      .rt-cell-add {
        min-height: 138px;
        border: 1px solid oklch(0.27 0.01 260);
        border-radius: 8px;
        background: oklch(0.14 0.008 260);
      }

      .rt-cell {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 5px;
        padding: 7px;
      }

      .rt-drag-handle {
        width: 24px;
        min-width: 24px;
        min-height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        cursor: grab;
        color: oklch(0.5 0.01 260);
        background: transparent;
      }

      .rt-drag-handle .rt-icon {
        width: 15px;
        height: 15px;
      }

      .rt-drag-handle .rt-icon circle {
        fill: currentColor;
        stroke: none;
      }

      .rt-cell-grip,
      .rt-cell-select {
        width: 24px;
        min-width: 24px;
        height: 24px;
        min-height: 24px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        line-height: 1;
      }

      .rt-cell-select .rt-icon,
      .rt-cell-grip .rt-icon {
        width: 15px;
        height: 15px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .rt-cell-select {
        appearance: auto;
        width: 15px;
        min-width: 15px;
        height: 15px;
        min-height: 15px;
        margin: 0 3px;
        padding: 0;
        border-radius: 50%;
        color: oklch(0.68 0.03 200);
        background: transparent;
        cursor: pointer;
      }

      .rt-drag-handle:active {
        cursor: grabbing;
      }

      .rt-track-grip {
        flex: 0 0 auto;
      }

      .rt-cell-head {
        min-height: 26px;
      }

      .rt-cell-spacer {
        flex: 1 1 auto;
        min-width: 4px;
      }

      .rt-track.is-track-drop-before {
        border-top-color: oklch(0.72 0.15 var(--track-hue));
        box-shadow: 0 -3px 0 oklch(0.72 0.15 var(--track-hue));
      }

      .rt-cell.is-cell-drop-before {
        border-left-color: oklch(0.72 0.15 var(--track-hue));
        box-shadow: -3px 0 0 oklch(0.72 0.15 var(--track-hue));
      }

      .rt-cell-add {
        display: flex;
        align-items: center;
        justify-content: center;
        border-style: dashed;
        color: oklch(0.6 0.01 260);
        background: transparent;
        font-weight: 600;
      }

      .rt-cell-add .rt-icon {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .rt-cell-add.is-cell-append-drop {
        border-color: oklch(0.72 0.15 var(--track-hue));
        background: oklch(0.17 0.04 var(--track-hue));
        box-shadow: inset 0 0 0 2px oklch(0.72 0.15 var(--track-hue));
      }

      .rt-cell-state {
        border-radius: 999px;
        padding: 2px 7px;
        background: oklch(0.18 0.01 260);
        color: oklch(0.58 0.01 260);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 10px;
        font-weight: 500;
      }

      .rt-cell.is-empty {
        border-style: dashed;
        background: oklch(0.15 0.008 260);
      }

      .rt-cell.has-text-idle {
        border-color: oklch(0.34 0.05 var(--track-hue));
        box-shadow: inset 0 0 0 1px oklch(0.72 0.15 var(--track-hue) / 0.06);
      }

      .rt-cell.is-selected-armed {
        box-shadow: inset 0 0 0 2px oklch(0.72 0.15 var(--track-hue) / 0.7), 0 0 18px oklch(0.72 0.15 var(--track-hue) / 0.12);
      }

      .rt-cell.is-selected-armed .rt-cell-state {
        background: oklch(0.24 0.06 var(--track-hue));
        color: oklch(0.86 0.1 var(--track-hue));
      }

      .rt-cell.is-active-playing {
        border-color: oklch(0.72 0.15 var(--track-hue));
        background: oklch(0.18 0.045 var(--track-hue));
        box-shadow: 0 0 18px oklch(0.72 0.15 var(--track-hue) / 0.28);
      }

      .rt-cell.is-active-playing .rt-cell-state {
        background: oklch(0.3 0.1 var(--track-hue));
        color: oklch(0.9 0.1 var(--track-hue));
      }

      .rt-cell.is-invalid {
        border-color: oklch(0.57 0.16 25);
        background: oklch(0.18 0.04 25);
      }

      .rt-cell.is-invalid .rt-cell-state,
      .rt-danger {
        color: oklch(0.86 0.13 25);
      }

      .rt-cell.is-being-edited {
        outline: 2px solid oklch(0.72 0.16 200);
        outline-offset: 2px;
      }

      .rt-cell-error {
        color: oklch(0.78 0.15 25);
        font-size: 11px;
      }

      .rt-block-grid {
        grid-template-columns: minmax(0, 820px);
      }

      .rt-block {
        display: grid;
        gap: 10px;
        align-content: start;
        border-color: oklch(0.26 0.01 260);
        background: oklch(0.17 0.009 260);
      }

      .rt-block-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .rt-block-head input {
        min-width: 0;
        border: 0;
        background: transparent;
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-weight: 600;
      }

      .rt-block-state {
        flex: 0 0 auto;
        border-radius: 999px;
        padding: 3px 8px;
        background: oklch(0.22 0.04 155);
        color: oklch(0.74 0.11 155);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 10px;
        font-weight: 500;
      }

      .rt-block.is-empty {
        border-style: dashed;
      }

      .rt-block.is-invalid {
        border-color: oklch(0.45 0.12 25);
        background: oklch(0.18 0.04 25);
      }

      .rt-block.is-invalid .rt-block-state,
      .rt-block-error {
        color: oklch(0.74 0.13 25);
      }

      .rt-block.is-invalid .rt-block-state {
        background: oklch(0.24 0.08 25);
      }

      .rt-block.is-unsaved {
        box-shadow: inset 0 0 0 1px oklch(0.55 0.1 95);
      }

      .rt-block-error,
      .rt-cascade-warning {
        font-size: 11px;
      }

      .rt-cascade-warning {
        display: grid;
        gap: 8px;
        padding: 10px;
        border: 1px solid oklch(0.42 0.1 55);
        border-radius: 6px;
        color: oklch(0.82 0.11 65);
        background: oklch(0.2 0.035 55);
      }

      .rt-cascade-warning ul {
        display: grid;
        gap: 6px;
        margin: 0;
        padding-left: 18px;
      }

      .rt-cascade-warning li {
        min-width: 0;
      }

      .rt-cascade-warning strong {
        display: block;
        margin-bottom: 3px;
        color: oklch(0.88 0.1 55);
      }

      .rt-cascade-warning code {
        white-space: nowrap;
        color: oklch(0.72 0.015 65);
      }

      .rt-score,
      .rt-empty {
        margin-top: 16px;
      }

      .rt-empty {
        border-style: dashed;
      }

      .rt-score {
        position: relative;
        display: grid;
        gap: 10px;
        min-height: min(var(--score-height), 70vh);
        overflow: hidden;
        padding: 0;
        border-color: oklch(0.22 0.01 260);
        background: oklch(0.155 0.008 260);
      }

      .rt-score-toolbar,
      .rt-score-controls,
      .rt-loop-controls,
      .rt-score-mode label {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .rt-score-toolbar {
        justify-content: space-between;
        flex-wrap: wrap;
        min-height: 40px;
        padding: 0 18px;
        border-bottom: 1px solid oklch(0.22 0.01 260);
      }

      .rt-score-title {
        min-width: 160px;
      }

      .rt-score-controls,
      .rt-loop-controls {
        flex-wrap: wrap;
      }

      .rt-score-play {
        border-color: oklch(0.4 0.06 200);
        background: oklch(0.22 0.03 200);
        color: oklch(0.85 0.08 200);
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-weight: 600;
      }

      .rt-score-readout {
        min-height: 32px;
        display: inline-flex;
        align-items: center;
        padding: 0 10px;
        border: 1px solid oklch(0.3 0.01 260);
        border-radius: 7px;
        color: oklch(0.62 0.01 260);
        background: oklch(0.13 0.01 260);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 11px;
        font-weight: 500;
      }

      .rt-loop-field {
        display: grid;
        grid-template-columns: auto 58px;
        align-items: center;
        gap: 6px;
        color: oklch(0.52 0.01 260);
        font-size: 11px;
      }

      .rt-loop-field input {
        min-height: 32px;
      }

      .rt-score-mode {
        justify-self: end;
        color: oklch(0.52 0.01 260);
        font-size: 11px;
      }

      .rt-score-mode input {
        width: auto;
        min-height: 0;
      }

      .rt-score-grid {
        position: relative;
        display: grid;
        grid-template-columns: minmax(160px, 220px) minmax(520px, 1fr);
        gap: 0;
        min-height: 0;
        overflow: auto;
      }

      .rt-score-grid::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        left: calc(min(220px, max(160px, 24vw)) + var(--playhead-x));
        width: 2px;
        background: oklch(0.72 0.16 200);
        box-shadow: 0 0 14px oklch(0.72 0.16 200 / 0.7);
        pointer-events: none;
      }

      .rt-score-mode:has(input:checked) + .rt-score-grid::after {
        position: sticky;
        left: 50%;
        z-index: 3;
      }

      .rt-score-corner,
      .rt-score-ruler,
      .rt-score-label,
      .rt-score-lane {
        min-height: 36px;
      }

      .rt-score-corner,
      .rt-ruler-cell {
        display: grid;
        place-items: center;
        color: oklch(0.58 0.01 260);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 10px;
        font-weight: 500;
      }

      .rt-score-ruler,
      .rt-score-lane {
        display: grid;
        grid-template-columns: repeat(16, minmax(30px, 1fr));
        gap: 0;
      }

      .rt-score-label {
        display: grid;
        grid-template-columns: 4px minmax(0, 1fr) 10px;
        align-items: center;
        gap: 9px;
        padding: 0 12px;
        border-right: 1px solid oklch(0.24 0.01 260);
        border-bottom: 1px solid oklch(0.19 0.008 260);
        border-radius: 0;
        background: transparent;
      }

      .rt-score-accent {
        align-self: stretch;
        border-radius: 999px;
        background: oklch(0.66 0.15 var(--track-hue));
      }

      .rt-score-label-main {
        min-width: 0;
        display: grid;
        gap: 2px;
      }

      .rt-score-label strong,
      .rt-score-label small {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .rt-score-label strong {
        font-family: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
        font-weight: 600;
      }

      .rt-score-label small {
        color: oklch(0.45 0.01 260);
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 10px;
      }

      .rt-score-on-dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: oklch(0.32 0.01 260);
      }

      .rt-score-on-dot.is-on {
        background: oklch(0.72 0.15 var(--track-hue));
        box-shadow: 0 0 10px oklch(0.72 0.15 var(--track-hue) / 0.7);
      }

      .rt-score-cell {
        min-width: 30px;
        min-height: 34px;
        padding: 0;
        border-radius: 0;
        border-width: 0 1px 1px 0;
        border-color: oklch(0.2 0.01 260);
        background: oklch(0.145 0.008 260);
      }

      .rt-score-cell.is-painted {
        border-color: oklch(0.5 0.12 var(--track-hue));
        background: oklch(0.52 0.13 var(--track-hue));
        box-shadow: inset 0 0 12px oklch(0.72 0.15 var(--track-hue) / 0.3);
      }

      .rt-score-cell.is-playhead,
      .rt-ruler-cell.is-playhead {
        outline: 2px solid oklch(0.72 0.16 200);
        outline-offset: -2px;
      }

      .rt-score-cell.is-outside-loop,
      .rt-ruler-cell.is-outside-loop {
        opacity: 0.38;
      }

      .rt-score-empty {
        position: absolute;
        right: 18px;
        bottom: 18px;
        max-width: min(360px, calc(100% - 36px));
        padding: 9px 12px;
        border: 1px dashed oklch(0.3 0.01 260);
        border-radius: 7px;
        color: oklch(0.5 0.01 260);
        background: oklch(0.15 0.008 260 / 0.94);
        font-size: 11px;
      }

      @media (max-width: 760px) {
        .rt-topbar,
        .rt-actions {
          flex-wrap: wrap;
          min-height: auto;
          padding: 8px 12px;
        }

        .rt-spacer {
          display: none;
        }

        .rt-page {
          grid-template-columns: 1fr;
        }

        .rt-rail {
          border-right: 0;
          border-bottom: 1px solid oklch(0.26 0.01 260);
          max-height: 34vh;
        }

        .rt-track {
          grid-template-columns: 1fr;
        }

        .rt-workspace {
          padding: 12px;
        }

        .rt-score-grid {
          grid-template-columns: minmax(120px, 150px) minmax(520px, 1fr);
        }

        .rt-page-header,
        .rt-block-head,
        .rt-block-actions {
          align-items: stretch;
          flex-direction: column;
        }

        .rt-header-actions {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="../src/bootstrap.js"></script>
  </body>
</html>
